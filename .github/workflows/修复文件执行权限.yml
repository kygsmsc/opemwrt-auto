name: 修复文件执行权限

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (格式: owner/repo)'
        required: true
        default: 'kygsmsc/immortalwrt'
      target_file:
        description: '目标文件路径'
        required: true
        default: 'target/linux/ramips/mt7621/base-files/etc/init.d/irqbalance-mt7621'
      branch:
        description: '目标分支 (留空则使用默认分支)'
        required: false
        default: ''

jobs:
  fix-permission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: 检查仓库分支
        run: |
          echo "当前仓库分支信息："
          git branch -a
          echo "当前 HEAD："
          git rev-parse --abbrev-ref HEAD

      - name: 设置文件为可执行
        run: |
          FILE="${{ github.event.inputs.target_file }}"
          
          # 检查文件是否存在
          if [ ! -f "$FILE" ]; then
            echo "❌ 错误: 文件不存在: $FILE"
            echo "当前目录内容:"
            ls -la
            echo "尝试查找文件："
            find . -name "$(basename "$FILE")" -type f 2>/dev/null || true
            exit 1
          fi
          
          # 获取当前 Git 中的文件权限
          CURRENT_MODE=$(git ls-files --stage "$FILE" | awk '{print $1}')
          
          # 设置可执行权限（幂等操作）
          git update-index --chmod=+x "$FILE"
          git add "$FILE"
          
          # 获取新的 Git 权限
          NEW_MODE=$(git ls-files --stage "$FILE" | awk '{print $1}')
          
          if [ "$CURRENT_MODE" = "$NEW_MODE" ]; then
            echo "ℹ️ 文件 $FILE 已经具有可执行权限，无需修改。"
          else
            echo "✅ 已将 $FILE 设置为可执行 (从 $CURRENT_MODE 变为 $NEW_MODE)"
          fi

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 获取当前分支
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          if git diff --cached --quiet; then
            echo "ℹ️ 无需提交，权限未变化"
          else
            git commit -m "🔧 自动设置可执行权限: ${{ github.event.inputs.target_file }}"
            git push origin "$CURRENT_BRANCH"
            echo "🚀 已推送更改到分支: $CURRENT_BRANCH"
          fi
