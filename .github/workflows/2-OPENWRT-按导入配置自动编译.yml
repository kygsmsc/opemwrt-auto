#============================================================================================
# https://github.com/P3TERX/Actions-OpenWrt
# https://github.com/ophub/amlogic-s9xxx-openwrt
# https://github.com/3wlh/Actions-OpenWrt
# Description: OpenWrt 按配置编译固件（加载1号生成的配置参数 + 自动编译固件 + 发布固件）
#============================================================================================
name: 2.OpenWrt-按导入配置自动编译

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "选择 OpenWrt 源码仓库（和1号文件保持一致）"
        required: true
        default: "lede-master"
        type: choice
        options:
          - lede-master               # LEDE 官方 (coolsnowwolf)
          - openwrt-main              # OpenWrt 官方 main
          - openwrt-24.10             # OpenWrt 24.10 稳定版
          - openwrt-23.05             # OpenWrt 23.05 稳定版
          - immortalwrt-master        # ImmortalWrt 最新
          - immortalwrt-24.10         # ImmortalWrt 24.10
          - istoreos-master           # iStoreOS 最新
          - kygs-immortalwrt-master   # 私人仓库：kygsmsc/immortalwrt
          
      version_tag:
        description: "选择源码版本 Tag（和1号文件保持一致）"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - v24.10.0
          - v24.10.1
          - v23.05.0
          - v23.05.1
          - v23.05.2
          - v23.05.3
          - v23.05.4
          
      config_file_path:
        description: "1号文件生成的配置文件路径（默认：config/auto-gen/.config）"
        required: false
        default: "config/auto-gen/.config"
        type: text
        
#env:
  #FEEDS_CONF: feeds/${{ inputs.source_branch }}/feeds.conf.default
  #FEEDS_CONF: feeds.conf.default
  #CONFIG_FILE: config/${{ inputs.source_branch }}/.config
  

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  DIY_P3_SH: diy-part3.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai


jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main
      
    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap* aspnetcore*
        [ -n "$AGENT_TOOLSDIRECTORY" ] && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo -E apt-get -qq update
        sudo -E apt -y install $(curl -fsSL https://is.gd/depend_ubuntu_2204_openwrt)
        sudo apt-get install python3.9 -y
        sudo -E apt-get -qq autoremove --purge
        sudo -E systemctl daemon-reload
        sudo -E apt-get -qq clean && sudo -E apt-get -qq autoclean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /builder
        sudo chown $USER:$GROUPS /builder

    - name: 自动匹配仓库地址与分支（对齐1号文件逻辑）
      id: repo
      run: |
        case "${{ github.event.inputs.source_repo }}" in
          lede-master)
            REPO_URL="https://github.com/coolsnowwolf/lede"
            REPO_BRANCH="master"
            ;;
          openwrt-main)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="main"
            ;;
          openwrt-24.10)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-24.10"
            ;;
          openwrt-23.05)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-23.05"
            ;;
          immortalwrt-master)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="master"
            ;;
          immortalwrt-24.10)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="openwrt-24.10"
            ;;
          istoreos-master)
            REPO_URL="https://github.com/istoreos/istoreos"
            REPO_BRANCH="main"
            ;;
          kygs-immortalwrt-master)
            REPO_URL="https://github.com/kygsmsc/immortalwrt"
            REPO_BRANCH="master"
            ;;
          *)
            echo "错误：未定义的仓库"
            exit 1
            ;;
        esac
        echo "REPO_URL=$REPO_URL" >> $GITHUB_OUTPUT
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_OUTPUT

    - name: 克隆源代码并切换版本Tag（对齐1号文件逻辑）
      id: codes
      working-directory: /builder
      run: |
        df -hT $PWD
        REPO_URL="${{ steps.repo.outputs.REPO_URL }}"
        REPO_BRANCH="${{ steps.repo.outputs.REPO_BRANCH }}"
        VERSION_TAG="${{ github.event.inputs.version_tag }}"
        
        # 克隆指定分支
        git clone -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /builder/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        
        # 切换指定Tag（和1号文件逻辑一致）
        if [ "$VERSION_TAG" != "latest" ]; then
          git fetch --tags 2>/dev/null || true
          git checkout $VERSION_TAG 2>/dev/null || echo "ℹ️ Tag 不存在，使用当前分支最新代码"
        fi
        
        echo "REPO_URL=${REPO_URL}" >> ${GITHUB_OUTPUT}
        echo "TAGS_NAME=${{ github.event.inputs.source_repo }}" >> ${GITHUB_OUTPUT}
        echo "status=success" >> ${GITHUB_OUTPUT}
        
    - name: 加载自定义提要
      run: |
        rm -rf tmp
        [ -e ../feeds/$FEEDS_CONF ] && cp -f ../feeds/$FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载1号文件生成的配置文件
      run: |
        # 加载自定义文件
        [ -e files ] && mv files openwrt/files
        
        # 加载1号文件生成的.config（优先使用输入的路径）
        CONFIG_FILE="${{ github.event.inputs.config_file_path }}"
        if [ -e "$CONFIG_FILE" ]; then
          mv "$CONFIG_FILE" openwrt/.config
          echo "✅ 成功加载配置文件：$CONFIG_FILE"
        else
          echo "⚠️ 配置文件路径不存在：$CONFIG_FILE，使用默认配置"
          touch openwrt/.config
        fi
        
        # 执行自定义脚本2
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
    - name: 下载 package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        # 清理无效文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 编译失败时降级单线程编译
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        # 提取设备名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传bin目录（可选）
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 组织固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到Release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 清理旧工作流运行记录
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 删除旧版本Release
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
