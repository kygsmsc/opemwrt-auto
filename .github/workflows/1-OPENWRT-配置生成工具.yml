name: 1.OpenWrt-配置生成工具

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "选择 OpenWrt 源码仓库"
        required: true
        default: "lede-master"
        type: choice
        options:
          - lede-master               # LEDE 官方 (coolsnowwolf)
          - openwrt-main              # OpenWrt 官方 main
          - openwrt-24.10             # OpenWrt 24.10 稳定版
          - openwrt-23.05             # OpenWrt 23.05 稳定版
          - immortalwrt-master        # ImmortalWrt 最新
          - immortalwrt-24.10         # ImmortalWrt 24.10
          - istoreos-master           # iStoreOS 最新
          - kygs-immortalwrt-master   # 你的私人仓库：kygsmsc/immortalwrt
          
      version_tag:
        description: "选择源码版本 Tag（ latest = 最新代码）"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - v24.10.0
          - v24.10.1
          - v23.05.0
          - v23.05.1
          - v23.05.2
          - v23.05.3
          - v23.05.4
        
      ssh:
        description: "启用 SSH 连接（可在线 make menuconfig）"
        required: false
        default: true
        type: boolean
     

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  UPLOAD_CONFIG: true
  
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@main

    - name: 安装系统依赖
      run: |
        sudo apt update -y
        sudo apt install -y build-essential cmake flex bison gawk gcc-multilib g++-multilib \
        libncurses5-dev python2 python3 git wget curl zip unzip bzip2 p7zip-full rsync file \
        gettext libssl-dev libelf-dev autopoint libtool-bin perl findutils grep libreadline-dev
        sudo timedatectl set-timezone "$TZ"

  
  

        
    - name: 自动匹配仓库地址与分支
      id: repo
      run: |
        case "${{ github.event.inputs.source_repo }}" in
          lede-master)
            REPO_URL="https://github.com/coolsnowwolf/lede"
            REPO_BRANCH="master"
            ;;
          openwrt-main)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="main"
            ;;
          openwrt-24.10)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-24.10"
            ;;
          openwrt-23.05)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-23.05"
            ;;
          immortalwrt-master)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="master"
            ;;
          immortalwrt-24.10)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="openwrt-24.10"
            ;;
          istoreos-master)
            REPO_URL="https://github.com/istoreos/istoreos"
            REPO_BRANCH="main"
            ;;
          kygs-immortalwrt-master)
            REPO_URL="https://github.com/kygsmsc/immortalwrt"
            REPO_BRANCH="master"
            ;;
          *)
            echo "错误：未定义的仓库"
            exit 1
            ;;
        esac
        echo "REPO_URL=$REPO_URL" >> $GITHUB_OUTPUT
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_OUTPUT
        
    
    - name: 切换OPENWRT的分支
      run: |
        cd openwrt
        #git fetch --tags --all  # 拉取所有标签和远程分支
        git tag    # 你可以查看所有可用的版本
        git branch -a  # 查看当前使用的版本
        git checkout ${{inputs.banben}}   # 切换到指定的版本
        git branch -a  # 查看当前使用的版本
        
    - name: 加载自定义提要
      run: |
        rm -rf tmp
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    #- name: 再次更新 feeds
     # run: cd openwrt && ./scripts/feeds update -i -f

    #- name: 再次安装 feeds
     # run: cd openwrt && ./scripts/feeds install -a -f
      
    - name: 加载自定义配置
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

     #- name: SSH连接 (cd openwrt && make menuconfig )
      #if: (inputs.ssh == true) || contains(github.event.action, 'ssh')
      #uses: rdp-studio/ssh2actions@main
      #env:
        #TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        #TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                
    - name: SSH连接 (cd openwrt && make menuconfig )
      if: (inputs.ssh == true) || contains(github.event.action, 'ssh')
      #uses: mxschmitt/action-tmate@v3
      uses: rdp-studio/ssh2actions@main
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: 下载配置
      id: config
      run: |
        cd openwrt
        make defconfig
        echo -e "$(cat .config)"
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
      
    - name: 整理文件
      id: files
      run: |
        cd openwrt
        [[ -d "Output" ]] || mkdir Output
        cp -f .config Output/config
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传配置目录
      uses: actions/upload-artifact@main
      if: env.UPLOAD_CONFIG == 'true' && !cancelled()
      with:
        name: ${{ env.FILE_NAME }}Config${{ env.FILE_DATE }}
        path: openwrt/Output
