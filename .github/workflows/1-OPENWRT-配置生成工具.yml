#============================================================================================
# https://github.com/P3TERX/Actions-OpenWrt
# Description: OpenWrt 配置生成工具（自动分支 + 可视化版本 + SSH 连接）
#============================================================================================
name: OpenWrt 配置生成工具
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "选择 OpenWrt 源码仓库"
        required: true
        default: "lede-master"
        type: choice
        options:
          - lede-master               # LEDE 官方 (coolsnowwolf)
          - openwrt-main              # OpenWrt 官方 main
          - openwrt-24.10             # OpenWrt 24.10 稳定版
          - openwrt-23.05             # OpenWrt 23.05 稳定版
          - immortalwrt-master        # ImmortalWrt 最新
          - immortalwrt-24.10         # ImmortalWrt 24.10
          - istoreos-master           # iStoreOS 最新
          - kygs-immortalwrt-master   # 你的私人仓库：kygsmsc/immortalwrt
      version_tag:
        description: "选择源码版本 Tag（ latest = 最新代码）"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - v24.10.0
          - v24.10.1
          - v23.05.0
          - v23.05.1
          - v23.05.2
          - v23.05.3
          - v23.05.4
      
env:
  FEEDS_CONF: "feeds.conf.default"
  CONFIG_FILE: ".config"
  DIY_P1_SH: "diy-part1.sh"
  DIY_P2_SH: "diy-part2.sh"
  UPLOAD_BIN_DIR: "false"
  UPLOAD_FIRMWARE: "true"
  UPLOAD_RELEASE: "true"
  TZ: "Asia/Shanghai"
  UPLOAD_CONFIG: "true"

jobs:
  build:
    runs-on: "ubuntu-22.04"  # 显式标注为字符串
    steps:
    - uses: "actions/checkout@main"

    - name: 安装系统依赖
      run: |
        sudo apt update -y
        sudo apt install -y build-essential cmake flex bison gawk gcc-multilib g++-multilib \
        libncurses5-dev python2 python3 git wget curl zip unzip bzip2 p7zip-full rsync file \
        gettext libssl-dev libelf-dev autopoint libtool-bin perl findutils grep libreadline-dev
        sudo timedatectl set-timezone "$TZ"

    
    
    - name: 加载 feeds 配置
      run: |
        cd openwrt
        [ -e "../$FEEDS_CONF" ] && cp -f "../$FEEDS_CONF" feeds.conf.default

    - name: 执行自定义脚本1
      run: |
        chmod +x "../$DIY_P1_SH"
        cd openwrt
        ../"$DIY_P1_SH"

    - name: 更新 & 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载 .config 配置
      run: |
        cd openwrt
        [ -e "../$CONFIG_FILE" ] && cp -f "../$CONFIG_FILE" .config

    - name: 执行自定义脚本2
      run: |
        chmod +x "../$DIY_P2_SH"
        cd openwrt
        ../"$DIY_P2_SH"


