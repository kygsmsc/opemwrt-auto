#============================================================================================
# https://github.com/P3TERX/Actions-OpenWrt
# https://github.com/ophub/amlogic-s9xxx-openwrt
# https://github.com/3wlh/Actions-OpenWrt
# openwrt:一体化工作流
# 功能:选择源码→生成配置→自动保存到仓库→全自动编译固件→发布Release
#============================================================================================

name: OpenWrt 配置生成+自动编译一体化

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "选择 OpenWrt 源码仓库"
        required: true
        default: "kygs-immortalwrt-master"
        type: choice
        options:
          - lede-master
          - openwrt-main
          - openwrt-24.10
          - openwrt-23.05
          - immortalwrt-master
          - immortalwrt-24.10
          - istoreos-master
          - kygs-immortalwrt-master
          
      version_tag:
        description: "选择源码版本 Tag（ latest = 最新代码）"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - v24.10.0
          - v24.10.1
          - v23.05.0
          - v23.05.1
          - v23.05.2
          - v23.05.3
          - v23.05.4
          
      ssh:
        description: "启用 SSH 连接（可在线 make menuconfig）"
        required: false
        default: true
        type: boolean
        
      config_save_path:
        description: "配置文件保存到仓库的路径（默认即可）"
        required: true
        default: ".config"
        type: text

      delete_last_release:
        description: "是否删除【上一个旧版本】？默认不删除"
        required: false
        default: "false"
        type: boolean

env:
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  DIY_P3_SH: diy-part3.sh
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true
  UPLOAD_FIRMWARE: true
  CONFIG_CCACHE: y  # 开启 ccache 加速
  CCACHE_DIR: /builder/ccache

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 检出仓库代码
      uses: actions/checkout@main
      with:
        persist-credentials: true

    # ==================== 提速优化 1：安装 ccache ====================
    - name: 安装编译环境依赖
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential ccache cmake flex bison gawk gcc-multilib g++-multilib libncurses5-dev python3 git wget curl zip unzip bzip2 p7zip-full rsync file gettext libssl-dev libelf-dev autopoint libtool-bin perl
        sudo apt-get install python3.9
        sudo -E apt-get -qq autoremove --purge
        sudo -E systemctl daemon-reload
        sudo -E apt-get -qq  clean && sudo -E apt-get -qq autoclean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /builder
        sudo chown $USER:$GROUPS /builder
        ccache -M 10G  # 扩大缓存

    - name: 自动匹配仓库地址与分支
      id: repo
      run: |
        case "${{ github.event.inputs.source_repo }}" in
          lede-master)
            REPO_URL="https://github.com/coolsnowwolf/lede"
            REPO_BRANCH="master" ;;
          openwrt-main)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="main" ;;
          openwrt-24.10)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-24.10" ;;
          openwrt-23.05)
            REPO_URL="https://github.com/openwrt/openwrt"
            REPO_BRANCH="openwrt-23.05" ;;
          immortalwrt-master)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="master" ;;
          immortalwrt-24.10)
            REPO_URL="https://github.com/immortalwrt/immortalwrt"
            REPO_BRANCH="openwrt-24.10" ;;
          istoreos-master)
            REPO_URL="https://github.com/istoreos/istoreos"
            REPO_BRANCH="main" ;;
          kygs-immortalwrt-master)
            REPO_URL="https://github.com/kygsmsc/immortalwrt"
            REPO_BRANCH="master" ;;
          *)
            echo "错误：未定义仓库" && exit 1 ;;
        esac
        echo "REPO_URL=$REPO_URL" >> $GITHUB_OUTPUT
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_OUTPUT

    - name: 克隆 OpenWrt 源码
      working-directory: /builder
      run: |
        git clone -b ${{ steps.repo.outputs.REPO_BRANCH }} ${{ steps.repo.outputs.REPO_URL }} openwrt
        ln -sf /builder/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        if [ "${{ github.event.inputs.version_tag }}" != "latest" ]; then
          git fetch --tags 2>/dev/null || true
          git checkout ${{ github.event.inputs.version_tag }} 2>/dev/null || echo "使用分支最新代码"
        fi
        echo "status=success" >> ${GITHUB_OUTPUT}
    # ==================== 提速优化 2：超级缓存（第二次编译10分钟） ====================
    - name: 缓存 OpenWrt 编译文件
      uses: actions/cache@v3
      with:
        path: |
          /builder/openwrt/dl
          /builder/openwrt/build_dir
          /builder/openwrt/staging_dir
          /builder/ccache
        key: openwrt-${{ github.event.inputs.source_repo }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          openwrt-${{ github.event.inputs.source_repo }}-

    - name: 加载 feeds 配置
      run: |
        cd openwrt
        if [ -f "$FEEDS_CONF" ] && [ "$FEEDS_CONF" != "feeds.conf.default" ]; then
        cp -f "$FEEDS_CONF" feeds.conf.default
        fi
        
    - name: 执行自定义脚本1
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新并安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e files ] && cp -rf files openwrt/
        if [ -f ".config" ]; then
        cp -f .config openwrt/.config
        echo "✅ 成功将仓库根目录的 .config 复制到 openwrt/.config"
        elif [ -f "config.seed" ]; then
        cp -f config.seed openwrt/.config
        echo "✅ 使用 config.seed 作为配置文件"
        else
        echo "⚠️ 未找到自定义配置文件，使用默认配置"
        fi

    - name: 执行自定义脚本2
      run: |
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: SSH 远程连接（可选）（cd openwrt && make menuconfig）
      if: github.event.inputs.ssh == 'true'
      uses: rdp-studio/ssh2actions@main
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: 生成 .config 配置文件
      run: |
        cd openwrt
        make defconfig
        echo "FILE_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        
    - name: 自动保存配置文件到仓库
      run: |
        cd "$GITHUB_WORKSPACE"
        CONFIG_PATH="${{ github.event.inputs.config_save_path }}"

        echo -e "\033[34m===== 开始打印 openwrt/.config 配置内容 =====\033[0m"
        cat openwrt/.config
        echo -e "\033[34m===== .config内容打印完毕 =====\033[0m"

        # 复制文件并判断结果
        if cp -f openwrt/.config "$CONFIG_PATH"; then
        echo -e "\033[32m✅ 文件复制成功：已将.config保存至 => $CONFIG_PATH\033[0m"
        else
        echo -e "\033[31m❌ 文件复制失败：无法拷贝.config到 $CONFIG_PATH\033[0m"
        fi

        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add -f "$CONFIG_PATH" 2>/dev/null
        # 提交判断
        if git commit -m "Auto update config [$(date +%Y-%m-%d)]" --allow-empty 2>/dev/null; then
        echo -e "\033[32m✅ Git提交配置文件成功\033[0m"
        else
        echo -e "\033[33m⚠️ 无配置变更，本次无需提交\033[0m"
        fi

        # 推送判断
        if git push --force 2>/dev/null; then
        echo -e "\033[32m✅ 配置文件已成功推送至远程仓库\033[0m"
        else
        echo -e "\033[31m❌ Git推送远程仓库失败\033[0m"
        fi
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          continue-on-error: true

    # ==================== 提速优化 3：多线程下载 ====================
    - name: 下载编译依赖
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)  # 多线程下载
        find dl -size -1024c -delete

    # ==================== 提速优化 4：满核编译 ====================
    - name: 开始编译固件
      run: |
        cd openwrt
        make -j$(nproc) V=w  # 最快模式
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查空间使用情况
      if: (!cancelled())
      run: df -hT

    - name: 上传bin目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 组织文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件以发布
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 删除工作流运行
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 删除旧版本（仅删除上一个）
      if: github.event.inputs.delete_last_release == 'true' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 1
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
